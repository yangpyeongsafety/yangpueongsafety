<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>인력 운영 메인</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=SUIT:wght@400;500;600;700;800&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="styles.css" />
</head>
<body data-page="main" data-role="admin">
  <div class="app-shell">
    <div class="session-bar" id="sessionBar"></div>
    <header class="hero main-hero">
      <div>
        <p class="eyebrow">WORKFORCE OPS</p>
        <h1>현장 인력 운영을 페이지별로 나눠 관리하세요</h1>
        <p class="hero-copy">
          메인에서는 필요한 작업만 바로 들어가고, 각 페이지에서 인력 배정, 근무시간 입력,
          정산 데이터를 따로 관리할 수 있도록 분리했습니다.
        </p>
      </div>
      <div class="hero-stats" id="heroStats"></div>
    </header>

    <main class="dashboard">
      <section class="panel menu-panel">
        <div class="menu-grid">
          <a class="menu-card" href="assignment.html">
            <p class="section-kicker">PAGE 1</p>
            <h2>인력배정</h2>
            <p>거래처 요청 등록, 인력 등록, 현장 배정을 관리합니다.</p>
          </a>
          <a class="menu-card" href="worker-entry.html">
            <p class="section-kicker">PAGE 2</p>
            <h2>근무시간 입력</h2>
            <p>인력이 직접 시작/종료시간과 휴게시간을 입력하고 공수를 계산합니다.</p>
          </a>
          <a class="menu-card" href="settlement.html">
            <p class="section-kicker">PAGE 3</p>
            <h2>정산</h2>
            <p>거래처별 근무일, 근무 인력, 실근무시간, 공수 데이터를 확인합니다.</p>
          </a>
        </div>
      </section>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <script src="app.js"></script>
</body>
</html>
