<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>로그인</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=SUIT:wght@400;500;600;700;800&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="styles.css" />
</head>
<body data-page="login" data-role="public">
  <div class="app-shell">
    <div class="session-bar" id="sessionBar"></div>
    <header class="hero auth-hero">
      <div>
        <p class="eyebrow">LOGIN</p>
        <h1 id="userGateName">역할별 로그인</h1>
        <p class="hero-copy" id="authHint">관리자 또는 사용자 계정으로 로그인하세요.</p>
      </div>
    </header>
    <main class="dashboard">
      <section class="panel auth-panel auth-single-panel">
        <form id="loginForm" class="subpanel stack-form" method="post" action="javascript:void(0)" autocomplete="off">
          <h2>로그인</h2>
          <label>
            권한
            <select name="role" id="loginRole" required>
              <option value="admin">관리자</option>
              <option value="worker">사용자</option>
            </select>
          </label>
          <label>
            아이디
            <input type="text" name="loginId" required />
          </label>
          <label>
            비밀번호
            <input type="password" name="password" required />
          </label>
          <button type="submit" class="primary-btn">로그인</button>
          <p class="auth-switch">처음이시면 <a href="signup.html">회원가입</a>으로 이동하세요.</p>
        </form>
        <p id="authMessage" class="auth-message"></p>
      </section>
    </main>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <script src="app.js?v=20260423-1"></script>
</body>
</html>
