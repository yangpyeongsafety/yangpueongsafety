<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>로그인</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=SUIT:wght@400;500;600;700;800&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="styles.css" />
</head>
<body data-page="login" data-role="public">
  <div class="app-shell">
    <div class="session-bar" id="sessionBar">
      <span>로그인 페이지입니다.</span>
      <span class="session-actions">
        <a class="session-link" href="index.html">메인</a>
        <a class="session-link" href="signup.html">회원가입</a>
      </span>
    </div>
    <header class="hero auth-hero">
      <div>
        <p class="eyebrow">LOGIN</p>
        <h1>로그인</h1>
        <p class="hero-copy">관리자 또는 작업자 계정으로 로그인하세요.</p>
      </div>
    </header>
    <main class="dashboard">
      <section class="panel auth-panel auth-single-panel">
        <form
          id="loginForm"
          class="subpanel stack-form"
          method="post"
          action="#"
          autocomplete="off"
          onsubmit="window.directLogin(event); return false;"
        >
          <h2>로그인</h2>
          <label>
            권한
            <select name="role" id="loginRole" required>
              <option value="worker" selected>작업자</option>
              <option value="admin">관리자</option>
            </select>
          </label>
          <label>
            아이디
            <input type="text" name="loginId" required />
          </label>
          <label>
            비밀번호
            <input type="password" name="password" required />
          </label>
          <button type="button" class="primary-btn" onclick="window.directLogin(event)">로그인</button>
          <p class="auth-switch">처음이시면 <a href="signup.html">회원가입</a>으로 이동하세요.</p>
        </form>
        <p id="authMessage" class="auth-message">로그인을 준비 중입니다...</p>
      </section>
    </main>
  </div>

  <script src="supabase-config.js"></script>
  <script src="access-control.js"></script>
  <script>
    const loginForm = document.getElementById("loginForm");
    const loginRoleSelect = document.getElementById("loginRole");
    const authMessage = document.getElementById("authMessage");

    function setLoginMessage(message, isError = true) {
      authMessage.textContent = message;
      authMessage.className = isError ? "auth-message error" : "auth-message success";
    }

    function loginEmail(loginId) {
      return window.accessControl?.toAuthEmail(loginId);
    }

    function normalizeRole(value) {
      return window.accessControl?.normalizeRole(value) || (value === "admin" ? "admin" : "worker");
    }

    function isWorkerRole(role) {
      return window.accessControl?.isWorkerRole(role) || role === "worker" || role === "user";
    }

    function clearStoredSession() {
      localStorage.removeItem("workforce.session");
      localStorage.removeItem("sb-riyxhsesprzvnvconhos-auth-token");
    }

    function applyRequestedRole() {
      const requestedRole = normalizeRole(new URLSearchParams(window.location.search).get("role"));
      if (loginRoleSelect) {
        loginRoleSelect.value = requestedRole;
      }
    }

    window.directLogin = async function directLogin(event) {
      if (event) {
        event.preventDefault();
        event.stopPropagation();
      }

      setLoginMessage("로그인을 처리 중입니다...", false);

      if (!window.SUPABASE_URL || !window.SUPABASE_ANON_KEY) {
        setLoginMessage("Supabase 설정을 불러오지 못했습니다. supabase-config.js를 확인해 주세요.");
        return false;
      }

      const formData = new FormData(loginForm);
      const role = normalizeRole(formData.get("role"));
      const loginId = String(formData.get("loginId") || "").trim();
      const password = String(formData.get("password") || "").trim();

      if (!loginId || !password) {
        setLoginMessage("아이디와 비밀번호를 입력해 주세요.");
        return false;
      }

      try {
        const response = await fetch(`${window.SUPABASE_URL}/auth/v1/token?grant_type=password`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            apikey: window.SUPABASE_ANON_KEY,
            Authorization: `Bearer ${window.SUPABASE_ANON_KEY}`
          },
          body: JSON.stringify({
            email: loginEmail(loginId),
            password
          })
        });

        const result = await response.json();

        if (!response.ok) {
          setLoginMessage(`로그인 실패: ${result.error_description || result.msg || result.message || "아이디 또는 비밀번호를 확인해 주세요."}`);
          return false;
        }

        const profileResponse = await fetch(`${window.SUPABASE_URL}/rest/v1/profiles?id=eq.${result.user.id}&select=*`, {
          headers: {
            apikey: window.SUPABASE_ANON_KEY,
            Authorization: `Bearer ${result.access_token}`
          }
        });
        const profiles = await profileResponse.json();
        const profile = profiles[0];

        if (!profile) {
          clearStoredSession();
          setLoginMessage("로그인은 되었지만 사용자 프로필을 찾지 못했습니다. Supabase profiles 테이블을 확인해 주세요.");
          return false;
        }

        const roleMatched = role === "admin"
          ? profile.role === "admin"
          : isWorkerRole(profile.role);

        if (!roleMatched) {
          clearStoredSession();
          setLoginMessage("선택한 권한과 가입된 권한이 다릅니다.");
          return false;
        }

        if (role === "admin" && !window.accessControl?.canUseAdminService(profile)) {
          clearStoredSession();
          setLoginMessage(window.accessControl?.getAdminApprovalMessage() || "관리자 승인 후 이용할 수 있습니다.");
          return false;
        }

        const authPayload = {
          access_token: result.access_token,
          refresh_token: result.refresh_token,
          expires_in: result.expires_in,
          expires_at: Math.floor(Date.now() / 1000) + Number(result.expires_in || 0),
          token_type: result.token_type,
          user: result.user
        };

        localStorage.setItem("workforce.session", JSON.stringify({
          profile,
          auth: authPayload
        }));
        localStorage.setItem("sb-riyxhsesprzvnvconhos-auth-token", JSON.stringify(authPayload));

        setLoginMessage("로그인 성공. 페이지를 이동합니다.", false);
        const redirect = new URLSearchParams(window.location.search).get("redirect");
        const nextPage = window.accessControl?.getDefaultPageForProfile(profile) || (role === "admin" ? "main.html" : "worker-entry.html");
        window.location.href = redirect || nextPage;
      } catch (error) {
        setLoginMessage(`로그인 요청 실패: ${error.message}`);
      }

      return false;
    };

    applyRequestedRole();
    const queryMessage = new URLSearchParams(window.location.search).get("message");
    if (queryMessage) {
      setLoginMessage(queryMessage);
    } else {
      setLoginMessage("로그인 준비 완료. 아이디와 비밀번호를 입력해 주세요.", false);
    }
  </script>
</body>
</html>
