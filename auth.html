<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>계정 선택</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=SUIT:wght@400;500;600;700;800&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="styles.css" />
</head>
<body data-page="auth" data-role="public">
  <div class="app-shell">
    <div class="session-bar" id="sessionBar"></div>
    <header class="hero auth-hero">
      <div>
        <p class="eyebrow">ACCOUNT</p>
        <h1>로그인과 회원가입을 따로 이용하세요</h1>
        <p class="hero-copy">헷갈리지 않도록 페이지를 분리했습니다. 아래에서 원하는 작업을 선택하세요.</p>
      </div>
    </header>
    <main class="dashboard">
      <section class="panel auth-panel">
        <div class="menu-grid auth-menu-grid">
          <a class="menu-card" href="login.html">
            <p class="section-kicker">STEP 1</p>
            <h2>로그인</h2>
            <p>이미 계정이 있으면 로그인 페이지로 이동합니다.</p>
          </a>
          <a class="menu-card" href="signup.html">
            <p class="section-kicker">STEP 2</p>
            <h2>회원가입</h2>
            <p>처음 사용하는 관리자 또는 사용자는 회원가입 페이지로 이동합니다.</p>
          </a>
        </div>
      </section>
    </main>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <script src="app.js"></script>
</body>
</html>
