<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>회원가입</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=SUIT:wght@400;500;600;700;800&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="styles.css" />
</head>
<body data-page="signup" data-role="public">
  <div class="app-shell">
    <div class="session-bar" id="sessionBar"></div>
    <header class="hero auth-hero">
      <div>
        <p class="eyebrow">SIGN UP</p>
        <h1 id="userGateName">역할별 회원가입</h1>
        <p class="hero-copy" id="authHint">관리자 또는 사용자 계정을 새로 만드세요.</p>
      </div>
    </header>
    <main class="dashboard">
      <section class="panel auth-panel auth-single-panel">
        <form id="signupForm" class="subpanel stack-form" method="post" action="#" autocomplete="off">
          <h2>회원가입</h2>
          <label>
            권한
            <select name="role" id="signupRole" required>
              <option value="admin">관리자</option>
              <option value="worker">사용자</option>
            </select>
          </label>
          <label>
            이름
            <input type="text" name="name" required />
            <small id="authNameField">관리자 이름을 입력하세요.</small>
          </label>
          <label>
            연락처
            <input type="text" name="phone" placeholder="010-0000-0000" />
          </label>
          <label>
            아이디
            <input type="text" name="signupId" required />
          </label>
          <label>
            비밀번호
            <input type="password" name="signupPassword" required />
          </label>
          <button type="submit" class="secondary-btn">회원가입</button>
          <p class="auth-switch">이미 계정이 있으면 <a href="index.html">로그인</a>으로 이동하세요.</p>
        </form>
        <p id="authMessage" class="auth-message"></p>
      </section>
    </main>
  </div>
  <script src="supabase-config.js"></script>
  <script>
    const signupForm = document.getElementById("signupForm");
    const authMessage = document.getElementById("authMessage");

    function setSignupMessage(message, isError = true) {
      authMessage.textContent = message;
      authMessage.className = isError ? "auth-message error" : "auth-message success";
    }

    function signupEmail(loginId) {
      const safeId = String(loginId)
        .trim()
        .toLowerCase()
        .replace(/[^a-z0-9._-]/g, "_");
      return `${safeId}@yangpyeongsafety.app`;
    }

    signupForm.addEventListener("submit", async (event) => {
      event.preventDefault();
      event.stopImmediatePropagation();

      const formData = new FormData(signupForm);
      const role = formData.get("role");
      const name = String(formData.get("name") || "").trim();
      const phone = String(formData.get("phone") || "").trim();
      const loginId = String(formData.get("signupId") || "").trim();
      const password = String(formData.get("signupPassword") || "").trim();

      if (!name || !loginId || !password) {
        setSignupMessage("회원가입 항목을 모두 입력해 주세요.");
        return;
      }

      setSignupMessage("회원가입을 처리 중입니다. 잠시만 기다려 주세요.", false);

      try {
        const response = await fetch(`${window.SUPABASE_URL}/auth/v1/signup`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            apikey: window.SUPABASE_ANON_KEY,
            Authorization: `Bearer ${window.SUPABASE_ANON_KEY}`
          },
          body: JSON.stringify({
            email: signupEmail(loginId),
            password,
            data: {
              login_id: loginId,
              role,
              name,
              phone
            }
          })
        });

        const result = await response.json();

        if (!response.ok) {
          setSignupMessage(`회원가입 실패: ${result.msg || result.message || "Supabase 오류가 발생했습니다."}`);
          return;
        }

        signupForm.reset();
        setSignupMessage("회원가입이 완료됐습니다. 로그인 페이지에서 로그인해 주세요.", false);
      } catch (error) {
        setSignupMessage(`회원가입 요청 실패: ${error.message}`);
      }
    });
  </script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="app.js?v=20260423-1"></script>
</body>
</html>
