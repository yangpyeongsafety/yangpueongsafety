<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>회원가입</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=SUIT:wght@400;500;600;700;800&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="styles.css" />
</head>
<body data-page="signup" data-role="public">
  <div class="app-shell">
    <div class="session-bar" id="sessionBar">
      <span>회원가입 페이지입니다.</span>
      <span class="session-actions">
        <a class="session-link" href="index.html">메인</a>
        <a class="session-link" href="index.html">로그인</a>
      </span>
    </div>
    <header class="hero auth-hero">
      <div>
        <p class="eyebrow">SIGN UP</p>
        <h1>회원가입</h1>
        <p class="hero-copy">관리자 또는 작업자 계정을 등록합니다.</p>
      </div>
    </header>
    <main class="dashboard">
      <section class="panel auth-panel">
        <form
          id="signupForm"
          class="subpanel stack-form"
          method="post"
          action="#"
          autocomplete="off"
          onsubmit="window.directSignup(event); return false;"
        >
          <h2>회원가입</h2>
          <div class="form-grid">
            <label>
              권한
              <select name="role" id="signupRole" required>
                <option value="worker" selected>작업자</option>
                <option value="admin">관리자</option>
              </select>
            </label>
            <label>
              이름
              <input type="text" name="name" required />
              <small id="authNameField">작업자는 배정 시 사용하는 이름과 같게 입력해 주세요.</small>
            </label>
            <label>
              주민번호
              <input
                type="text"
                name="residentNumber"
                inputmode="numeric"
                placeholder="000000-0000000"
                maxlength="14"
                required
              />
              <small>주민번호는 반드시 `-`를 포함한 `000000-0000000` 형식으로 입력해 주세요.</small>
            </label>
            <label>
              전화번호
              <input
                type="text"
                name="phone"
                inputmode="numeric"
                data-digits-only="true"
                placeholder="01012345678"
                required
              />
              <small>전화번호는 - 없이 숫자만 입력해 주세요.</small>
            </label>
            <label>
              은행
              <input type="text" name="bankName" required />
            </label>
            <label>
              계좌번호
              <input
                type="text"
                name="accountNumber"
                inputmode="numeric"
                data-digits-only="true"
                placeholder="숫자만 입력"
                required
              />
              <small>계좌번호는 - 없이 숫자만 입력해 주세요.</small>
            </label>
            <label>
              혈액형
              <select name="bloodType" required>
                <option value="">선택</option>
                <option value="A">A</option>
                <option value="B">B</option>
                <option value="AB">AB</option>
                <option value="O">O</option>
                <option value="RH+A">RH+A</option>
                <option value="RH+B">RH+B</option>
                <option value="RH+AB">RH+AB</option>
                <option value="RH+O">RH+O</option>
                <option value="RH-A">RH-A</option>
                <option value="RH-B">RH-B</option>
                <option value="RH-AB">RH-AB</option>
                <option value="RH-O">RH-O</option>
              </select>
            </label>
            <label>
              현주소
              <input type="text" name="currentAddress" required />
            </label>
            <label>
              비상연락처
              <input
                type="text"
                name="emergencyContact"
                inputmode="numeric"
                data-digits-only="true"
                placeholder="숫자만 입력"
                required
              />
              <small>비상연락처는 - 없이 숫자만 입력해 주세요.</small>
            </label>
            <label>
              입사일
              <input type="date" name="hireDate" />
              <small>입사일은 선택 항목입니다.</small>
            </label>
            <label>
              아이디
              <input type="text" name="signupId" required />
            </label>
            <label>
              비밀번호
              <input type="password" name="signupPassword" required />
            </label>
          </div>
          <button type="button" class="secondary-btn" onclick="window.directSignup(event)">회원가입</button>
          <p class="auth-switch">이미 계정이 있으면 <a href="index.html">로그인</a>으로 이동해 주세요.</p>
        </form>
        <p id="authMessage" class="auth-message">회원가입을 준비 중입니다...</p>
      </section>
    </main>
  </div>

  <script src="supabase-config.js"></script>
  <script src="access-control.js"></script>
  <script>
    const signupForm = document.getElementById("signupForm");
    const signupRoleSelect = document.getElementById("signupRole");
    const authMessage = document.getElementById("authMessage");
    const authNameField = document.getElementById("authNameField");
    const residentNumberInput = signupForm?.querySelector("input[name='residentNumber']");
    const digitOnlyInputs = signupForm?.querySelectorAll("[data-digits-only='true']") || [];
    const workerOnlyFieldNames = [
      "residentNumber",
      "bankName",
      "accountNumber",
      "bloodType",
      "currentAddress",
      "emergencyContact",
      "hireDate"
    ];
    const workerOnlyFields = workerOnlyFieldNames
      .map((fieldName) => signupForm?.querySelector(`[name='${fieldName}']`))
      .filter(Boolean);

    function setSignupMessage(message, isError = true) {
      authMessage.textContent = message;
      authMessage.className = isError ? "auth-message error" : "auth-message success";
    }

    function signupEmail(loginId) {
      return window.accessControl?.toAuthEmail(loginId);
    }

    function normalizeDigits(value) {
      return window.accessControl?.normalizePhone(value) || String(value || "").replace(/\D+/g, "");
    }

    function normalizeResidentNumber(value) {
      const digits = normalizeDigits(value).slice(0, 13);
      if (digits.length <= 6) {
        return digits;
      }
      return `${digits.slice(0, 6)}-${digits.slice(6)}`;
    }

    function isValidResidentNumber(value) {
      return /^\d{6}-\d{7}$/.test(String(value || "").trim());
    }

    function normalizeRole(value) {
      return window.accessControl?.normalizeRole(value) || (value === "admin" ? "admin" : "worker");
    }

    function readTrimmed(formData, key) {
      return String(formData.get(key) || "").trim();
    }

    function syncDigitOnlyInputs() {
      digitOnlyInputs.forEach((input) => {
        input.value = normalizeDigits(input.value);
      });
    }

    function syncResidentNumberInput() {
      if (residentNumberInput) {
        residentNumberInput.value = normalizeResidentNumber(residentNumberInput.value);
      }
    }

    function applyRequestedRole() {
      const requestedRole = normalizeRole(new URLSearchParams(window.location.search).get("role"));
      if (signupRoleSelect) {
        signupRoleSelect.value = requestedRole;
      }
      syncSignupRoleFields();
    }

    function syncSignupRoleFields() {
      const isAdminSignup = normalizeRole(signupRoleSelect?.value) === "admin";
      workerOnlyFields.forEach((field) => {
        const label = field.closest("label");
        field.dataset.originalRequired = field.dataset.originalRequired || String(field.required);
        if (label) {
          label.hidden = isAdminSignup;
        }
        field.disabled = isAdminSignup;
        field.required = !isAdminSignup && field.dataset.originalRequired === "true";
        if (isAdminSignup) {
          field.value = "";
        }
      });
      if (authNameField) {
        authNameField.textContent = isAdminSignup
          ? "관리자 계정은 이름과 전화번호만 입력한 뒤 승인 대기 상태로 가입됩니다."
          : "작업자는 배정 시 사용하는 이름과 같게 입력해 주세요.";
      }
    }

    window.directSignup = async function directSignup(event) {
      if (event) {
        event.preventDefault();
        event.stopPropagation();
      }

      setSignupMessage("회원가입을 처리 중입니다...", false);

      if (!window.SUPABASE_URL || !window.SUPABASE_ANON_KEY) {
        setSignupMessage("Supabase 설정을 불러오지 못했습니다. supabase-config.js를 확인해 주세요.");
        return false;
      }

      syncDigitOnlyInputs();
      syncResidentNumberInput();
      const formData = new FormData(signupForm);
      const role = normalizeRole(formData.get("role"));
      const isAdminSignup = role === "admin";

      const payload = {
        login_id: readTrimmed(formData, "signupId"),
        role,
        name: readTrimmed(formData, "name"),
        phone: normalizeDigits(formData.get("phone"))
      };
      if (!isAdminSignup) {
        Object.assign(payload, {
          resident_number: normalizeResidentNumber(formData.get("residentNumber")),
          bank_name: readTrimmed(formData, "bankName"),
          account_number: normalizeDigits(formData.get("accountNumber")),
          blood_type: readTrimmed(formData, "bloodType"),
          current_address: readTrimmed(formData, "currentAddress"),
          emergency_contact: normalizeDigits(formData.get("emergencyContact")),
          hire_date: readTrimmed(formData, "hireDate") || null
        });
      }
      const password = readTrimmed(formData, "signupPassword");

      const requiredKeys = isAdminSignup
        ? ["login_id", "role", "name", "phone"]
        : [
            "login_id",
            "role",
            "name",
            "resident_number",
            "phone",
            "bank_name",
            "account_number",
            "blood_type",
            "current_address",
            "emergency_contact"
          ];

      if (!password || requiredKeys.some((key) => !payload[key])) {
        setSignupMessage(
          isAdminSignup
            ? "이름, 전화번호, 아이디, 비밀번호를 모두 입력해 주세요."
            : "입사일을 제외한 모든 항목을 입력해 주세요."
        );
        return false;
      }

      if (!isAdminSignup && !isValidResidentNumber(payload.resident_number)) {
        setSignupMessage("주민번호는 000000-0000000 형식으로 -를 포함해 입력해 주세요.");
        return false;
      }

      try {
        const response = await fetch(`${window.SUPABASE_URL}/auth/v1/signup`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            apikey: window.SUPABASE_ANON_KEY,
            Authorization: `Bearer ${window.SUPABASE_ANON_KEY}`
          },
          body: JSON.stringify({
            email: signupEmail(payload.login_id),
            password,
            data: payload
          })
        });

        const result = await response.json();

        if (!response.ok) {
          setSignupMessage(`회원가입 실패: ${result.msg || result.message || "Supabase 오류가 발생했습니다."}`);
          return false;
        }

        signupForm.reset();
        applyRequestedRole();
        setSignupMessage(
          isAdminSignup
            ? window.accessControl?.isApproverLoginId(payload.login_id)
              ? "승인 가능한 관리자 계정이 생성되었습니다. 로그인해 주세요."
              : "관리자 가입 신청이 접수되었습니다. fulmin2025 또는 envu86 계정의 승인 후 로그인할 수 있습니다."
            : "회원가입이 완료되었습니다. 로그인 페이지에서 로그인해 주세요.",
          false
        );
      } catch (error) {
        setSignupMessage(`회원가입 요청 실패: ${error.message}`);
      }

      return false;
    };

    digitOnlyInputs.forEach((input) => {
      input.addEventListener("input", () => {
        input.value = normalizeDigits(input.value);
      });
    });

    residentNumberInput?.addEventListener("input", () => {
      residentNumberInput.value = normalizeResidentNumber(residentNumberInput.value);
    });

    signupRoleSelect?.addEventListener("change", syncSignupRoleFields);
    applyRequestedRole();
    setSignupMessage("회원가입 준비 완료. 정보를 입력하고 버튼을 눌러 주세요.", false);
  </script>
</body>
</html>
