<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>인력배정</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=SUIT:wght@400;500;600;700;800&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="styles.css" />
</head>
<body data-page="assignment" data-role="admin">
  <div class="app-shell">
    <div class="session-bar" id="sessionBar"></div>
    <header class="hero">
      <div>
        <p class="eyebrow">ASSIGNMENT</p>
        <h1>거래처 요청과 인력 배정을 관리합니다</h1>
        <p class="hero-copy">전화나 문자로 받은 요청을 등록하고 보유 인력을 현장에 배정하세요.</p>
      </div>
      <nav class="top-nav">
        <a href="main.html">메인</a>
        <a href="settlement.html">정산</a>
        <a class="ghost-btn" href="logout.html">로그아웃</a>
      </nav>
    </header>

    <main class="dashboard">
      <section class="panel panel-highlight">
        <div class="panel-header">
          <div>
            <p class="section-kicker">1. 요청 접수</p>
            <h2>거래처 요청 등록</h2>
          </div>
        </div>
        <form
          id="requestForm"
          class="form-grid"
          method="post"
          action="#"
          autocomplete="off"
          onsubmit="window.directRequestSubmit(event); return false;"
        >
          <label>
            거래처명
            <input type="text" name="clientName" placeholder="예: 동서물류" required />
          </label>
          <label>
            연락 방식
            <select name="contactMethod" required>
              <option value="문자">문자</option>
              <option value="전화">전화</option>
            </select>
          </label>
          <label>
            요청 인원
            <input type="number" name="headcount" min="1" placeholder="예: 3" required />
          </label>
          <label>
            현장 위치
            <input type="text" name="siteLocation" placeholder="예: 인천 남동공단" required />
          </label>
          <label>
            근무일
            <input type="date" name="workDate" required />
          </label>
          <button type="button" class="primary-btn" onclick="window.directRequestSubmit(event)">요청 등록</button>
        </form>
        <p id="authMessage" class="auth-message"></p>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>거래처</th>
                <th>연락</th>
                <th>인원</th>
                <th>현장</th>
                <th>근무일</th>
                <th>상태</th>
              </tr>
            </thead>
            <tbody id="requestsTable"></tbody>
          </table>
        </div>
      </section>

      <section class="panel">
        <div class="panel-header">
          <div>
            <p class="section-kicker">2. 인력 배정</p>
            <h2>보유 인력 관리 및 현장 배치</h2>
          </div>
        </div>
        <div class="dual-grid">
          <div class="subpanel">
            <h3>인력 등록</h3>
            <form id="workerForm" class="stack-form">
              <label>
                이름
                <input type="text" name="name" placeholder="예: 김민수" required />
              </label>
              <label>
                연락처
                <input type="text" name="phone" placeholder="010-0000-0000" required />
              </label>
              <button type="submit" class="secondary-btn">인력 추가</button>
            </form>
            <div class="chips" id="workerChips"></div>
          </div>

          <div class="subpanel">
            <h3>현장 배정</h3>
            <form id="assignmentForm" class="stack-form">
              <label>
                배정할 요청
                <select name="requestId" id="assignmentRequestSelect" required></select>
              </label>
              <label>
                배정 인력
                <select name="workerIds" id="assignmentWorkerSelect" multiple required></select>
                <small>Ctrl 또는 Cmd로 여러 명 선택</small>
              </label>
              <button type="submit" class="primary-btn">배정 저장</button>
            </form>
            <div class="assignment-list" id="assignmentList"></div>
          </div>
        </div>
      </section>
    </main>
  </div>

  <template id="assignmentCardTemplate">
    <article class="assignment-card">
      <div class="assignment-card-header">
        <h3></h3>
        <span class="badge"></span>
      </div>
      <p class="assignment-meta"></p>
      <div class="assigned-workers"></div>
    </article>
  </template>

  <script src="supabase-config.js"></script>
  <script>
    const requestFormDirect = document.getElementById("requestForm");
    const requestMessage = document.getElementById("authMessage");

    function setRequestMessage(message, isError = true) {
      requestMessage.textContent = message;
      requestMessage.className = isError ? "auth-message error" : "auth-message success";
    }

    function getStoredSession() {
      try {
        const raw = localStorage.getItem("workforce.session");
        return raw ? JSON.parse(raw) : null;
      } catch (error) {
        return null;
      }
    }

    async function supabaseRest(path, options = {}) {
      const stored = getStoredSession();
      const token = stored?.auth?.access_token;
      if (!token) {
        throw new Error("로그인 세션이 없습니다. 다시 로그인해 주세요.");
      }

      const response = await fetch(`${window.SUPABASE_URL}/rest/v1/${path}`, {
        ...options,
        headers: {
          "Content-Type": "application/json",
          apikey: window.SUPABASE_ANON_KEY,
          Authorization: `Bearer ${token}`,
          ...(options.headers || {})
        }
      });

      const text = await response.text();
      const data = text ? JSON.parse(text) : null;
      if (!response.ok) {
        throw new Error(data?.message || data?.msg || response.statusText);
      }
      return data;
    }

    window.directRequestSubmit = async function directRequestSubmit(event) {
      if (event) {
        event.preventDefault();
        event.stopPropagation();
      }

      setRequestMessage("버튼 클릭 확인. 요청을 저장하는 중입니다...", false);

      const stored = getStoredSession();
      if (!stored?.profile?.id || stored.profile.role !== "admin") {
        setRequestMessage("관리자 로그인 세션이 없습니다. 다시 로그인해 주세요.");
        return false;
      }

      const formData = new FormData(requestFormDirect);
      const clientName = String(formData.get("clientName") || "").trim();
      const contactMethod = String(formData.get("contactMethod") || "").trim();
      const headcount = Number(formData.get("headcount"));
      const siteLocation = String(formData.get("siteLocation") || "").trim();
      const workDate = String(formData.get("workDate") || "").trim();

      if (!clientName || !contactMethod || !headcount || !siteLocation || !workDate) {
        setRequestMessage("거래처명, 연락 방식, 요청 인원, 현장 위치, 근무일을 모두 입력해 주세요.");
        return false;
      }

      try {
        const clients = await supabaseRest("clients?on_conflict=name", {
          method: "POST",
          headers: {
            Prefer: "resolution=merge-duplicates,return=representation"
          },
          body: JSON.stringify({
            name: clientName,
            created_by: stored.profile.id
          })
        });
        const client = clients?.[0];
        if (!client?.id) {
          throw new Error("거래처 저장 결과를 확인하지 못했습니다.");
        }

        await supabaseRest("job_requests", {
          method: "POST",
          headers: {
            Prefer: "return=representation"
          },
          body: JSON.stringify({
            client_id: client.id,
            contact_method: contactMethod,
            headcount,
            site_location: siteLocation,
            work_date: workDate,
            status: "대기",
            created_by: stored.profile.id
          })
        });

        requestFormDirect.reset();
        setRequestMessage("요청이 등록됐습니다. 새로고침하면 목록에 반영됩니다.", false);
      } catch (error) {
        setRequestMessage(`요청 등록 실패: ${error.message}`);
      }

      return false;
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="app.js?v=20260423-1"></script>
</body>
</html>
