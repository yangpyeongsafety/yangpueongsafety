<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>인력배정</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=SUIT:wght@400;500;600;700;800&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="styles.css" />
</head>
<body data-page="assignment" data-role="admin">
  <div class="app-shell">
    <div class="session-bar" id="sessionBar"></div>
    <header class="hero">
      <div>
        <p class="eyebrow">ASSIGNMENT</p>
        <h1>거래처 요청과 인력 배정을 관리합니다</h1>
        <p class="hero-copy">전화나 문자로 받은 요청을 등록하고 보유 인력을 현장에 배정하세요.</p>
      </div>
      <nav class="top-nav">
        <a href="main.html">메인</a>
        <a href="settlement.html">정산</a>
        <a class="ghost-btn" href="logout.html">로그아웃</a>
      </nav>
    </header>

    <main class="dashboard">
      <section class="panel panel-highlight">
        <div class="panel-header">
          <div>
            <p class="section-kicker">1. 요청 접수</p>
            <h2>거래처 요청 등록</h2>
          </div>
        </div>
        <form
          id="requestForm"
          class="form-grid"
          method="post"
          action="#"
          autocomplete="off"
          onsubmit="window.directRequestSubmit(event); return false;"
        >
          <label>
            거래처명
            <input type="text" name="clientName" placeholder="예: 동서물류" required />
          </label>
          <label>
            연락 방식
            <select name="contactMethod" required>
              <option value="문자">문자</option>
              <option value="전화">전화</option>
            </select>
          </label>
          <label>
            요청 인원
            <input type="number" name="headcount" min="1" placeholder="예: 3" required />
          </label>
          <label>
            현장 위치
            <input type="text" name="siteLocation" placeholder="예: 인천 남동공단" required />
          </label>
          <label>
            근무일
            <input type="date" name="workDate" required />
          </label>
          <button type="button" class="primary-btn" onclick="window.directRequestSubmit(event)">요청 등록</button>
        </form>
        <p id="authMessage" class="auth-message"></p>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>거래처</th>
                <th>연락</th>
                <th>인원</th>
                <th>현장</th>
                <th>근무일</th>
                <th>상태</th>
              </tr>
            </thead>
            <tbody id="requestsTable"></tbody>
          </table>
        </div>
      </section>

      <section class="panel">
        <div class="panel-header">
          <div>
            <p class="section-kicker">2. 인력 배정</p>
            <h2>보유 인력 관리 및 현장 배치</h2>
          </div>
        </div>
        <div class="dual-grid">
          <div class="subpanel">
            <h3>인력 등록</h3>
            <form
              id="workerForm"
              class="stack-form"
              method="post"
              action="#"
              autocomplete="off"
              onsubmit="window.directWorkerSubmit(event); return false;"
            >
              <label>
                이름
                <input type="text" name="name" placeholder="예: 김민수" required />
              </label>
              <label>
                연락처
                <input type="text" name="phone" placeholder="010-0000-0000" required />
              </label>
              <button type="button" class="secondary-btn" onclick="window.directWorkerSubmit(event)">인력 추가</button>
            </form>
            <div class="chips" id="workerChips"></div>
          </div>

          <div class="subpanel">
            <h3>현장 배정</h3>
            <form
              id="assignmentForm"
              class="stack-form"
              method="post"
              action="#"
              autocomplete="off"
              onsubmit="window.directAssignmentSubmit(event); return false;"
            >
              <label>
                배정할 요청
                <select name="requestId" id="assignmentRequestSelect" required></select>
              </label>
              <label>
                배정 인력
                <select name="workerIds" id="assignmentWorkerSelect" multiple required></select>
                <small>Ctrl 또는 Cmd로 여러 명 선택</small>
              </label>
              <button type="button" class="primary-btn" onclick="window.directAssignmentSubmit(event)">배정 저장</button>
            </form>
            <div class="assignment-list" id="assignmentList"></div>
          </div>
        </div>
      </section>
    </main>
  </div>

  <template id="assignmentCardTemplate">
    <article class="assignment-card">
      <div class="assignment-card-header">
        <h3></h3>
        <span class="badge"></span>
      </div>
      <p class="assignment-meta"></p>
      <div class="assigned-workers"></div>
    </article>
  </template>

  <script src="supabase-config.js"></script>
  <script>
    const requestFormDirect = document.getElementById("requestForm");
    const workerFormDirect = document.getElementById("workerForm");
    const assignmentFormDirect = document.getElementById("assignmentForm");
    const requestMessage = document.getElementById("authMessage");

    function setRequestMessage(message, isError = true) {
      requestMessage.textContent = message;
      requestMessage.className = isError ? "auth-message error" : "auth-message success";
    }

    function getStoredSession() {
      try {
        const raw = localStorage.getItem("workforce.session");
        return raw ? JSON.parse(raw) : null;
      } catch (error) {
        return null;
      }
    }

    async function supabaseRest(path, options = {}) {
      const stored = getStoredSession();
      const token = stored?.auth?.access_token;
      if (!token) {
        throw new Error("로그인 세션이 없습니다. 다시 로그인해 주세요.");
      }

      const response = await fetch(`${window.SUPABASE_URL}/rest/v1/${path}`, {
        ...options,
        headers: {
          "Content-Type": "application/json",
          apikey: window.SUPABASE_ANON_KEY,
          Authorization: `Bearer ${token}`,
          ...(options.headers || {})
        }
      });

      const text = await response.text();
      const data = text ? JSON.parse(text) : null;
      if (!response.ok) {
        throw new Error(data?.message || data?.msg || response.statusText);
      }
      return data;
    }

    function escapeDirectHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function formatDirectDate(value) {
      if (!value) {
        return "-";
      }
      return new Date(`${value}T00:00:00`).toLocaleDateString("ko-KR");
    }

    function renderDirectRequests(requests, clients) {
      const table = document.getElementById("requestsTable");
      const requestSelect = document.getElementById("assignmentRequestSelect");
      const clientMap = new Map(clients.map((client) => [client.id, client]));

      if (table) {
        if (requests.length === 0) {
          table.innerHTML = '<tr><td colspan="6" class="empty-row">등록된 요청이 없습니다.</td></tr>';
        } else {
          table.innerHTML = requests
            .map((request) => {
              const client = clientMap.get(request.client_id);
              return `
                <tr>
                  <td>${escapeDirectHtml(client?.name || "-")}</td>
                  <td>${escapeDirectHtml(request.contact_method || "-")}</td>
                  <td>${Number(request.headcount || 0)}명</td>
                  <td>${escapeDirectHtml(request.site_location || "-")}</td>
                  <td>${formatDirectDate(request.work_date)}</td>
                  <td><span class="status-pill">${escapeDirectHtml(request.status || "대기")}</span></td>
                </tr>
              `;
            })
            .join("");
        }
      }

      if (requestSelect) {
        requestSelect.innerHTML = requests.length
          ? requests
              .map((request) => {
                const client = clientMap.get(request.client_id);
                return `<option value="${request.id}">${escapeDirectHtml(client?.name || "-")} / ${escapeDirectHtml(request.site_location || "-")} / ${Number(request.headcount || 0)}명</option>`;
              })
              .join("")
          : '<option value="">요청이 없습니다</option>';
      }
    }

    function renderDirectWorkers(workers) {
      const chips = document.getElementById("workerChips");
      const workerSelect = document.getElementById("assignmentWorkerSelect");

      if (chips) {
        chips.innerHTML = workers.length
          ? workers
              .map((worker) => `<span class="chip">${escapeDirectHtml(worker.name)} · ${escapeDirectHtml(worker.phone || "연락처 없음")}</span>`)
              .join("")
          : '<p class="empty">등록된 인력이 없습니다.</p>';
      }

      if (workerSelect) {
        workerSelect.innerHTML = workers.length
          ? workers
              .map((worker) => `<option value="${worker.id}">${escapeDirectHtml(worker.name)} (${escapeDirectHtml(worker.phone || "연락처 없음")})</option>`)
              .join("")
          : '<option value="">인력이 없습니다</option>';
      }
    }

    function renderDirectAssignments(assignments, requests, clients, workers) {
      const assignmentList = document.getElementById("assignmentList");
      if (!assignmentList) {
        return;
      }

      const requestMap = new Map(requests.map((request) => [request.id, request]));
      const clientMap = new Map(clients.map((client) => [client.id, client]));
      const workerMap = new Map(workers.map((worker) => [worker.id, worker]));
      const grouped = new Map();

      assignments.forEach((assignment) => {
        if (!grouped.has(assignment.request_id)) {
          grouped.set(assignment.request_id, []);
        }
        grouped.get(assignment.request_id).push(assignment);
      });

      if (grouped.size === 0) {
        assignmentList.innerHTML = '<p class="empty">아직 배정된 내역이 없습니다.</p>';
        return;
      }

      assignmentList.innerHTML = Array.from(grouped.entries())
        .map(([requestId, requestAssignments]) => {
          const request = requestMap.get(requestId);
          const client = clientMap.get(request?.client_id);
          const assignedWorkers = requestAssignments
            .map((assignment) => workerMap.get(assignment.worker_id))
            .filter(Boolean);

          return `
            <article class="assignment-card">
              <div class="assignment-card-header">
                <h3>${escapeDirectHtml(client?.name || "-")}</h3>
                <span class="badge">${assignedWorkers.length}/${Number(request?.headcount || 0)}명</span>
              </div>
              <p class="assignment-meta">${escapeDirectHtml(request?.site_location || "-")} · ${formatDirectDate(request?.work_date)}</p>
              <div class="assigned-workers">
                ${
                  assignedWorkers.length
                    ? assignedWorkers
                        .map((worker) => `<span class="worker-tag">${escapeDirectHtml(worker.name)} · ${escapeDirectHtml(worker.phone || "연락처 없음")}</span>`)
                        .join("")
                    : '<span class="worker-tag">배정 인력 정보 없음</span>'
                }
              </div>
            </article>
          `;
        })
        .join("");
    }

    window.directLoadAssignments = async function directLoadAssignments() {
      const stored = getStoredSession();
      if (!stored?.profile?.id || stored.profile.role !== "admin") {
        return;
      }

      try {
        const [clients, requests, workers, assignments] = await Promise.all([
          supabaseRest("clients?select=*&order=name.asc"),
          supabaseRest("job_requests?select=*&order=work_date.desc,created_at.desc"),
          supabaseRest("workers?select=*&order=name.asc"),
          supabaseRest("assignments?select=*&order=created_at.desc")
        ]);
        renderDirectAssignments(assignments || [], requests || [], clients || [], workers || []);
      } catch (error) {
        setRequestMessage(`배정 내역 불러오기 실패: ${error.message}`);
      }
    };

    window.directLoadWorkers = async function directLoadWorkers() {
      const stored = getStoredSession();
      if (!stored?.profile?.id || stored.profile.role !== "admin") {
        return;
      }

      try {
        const workers = await supabaseRest("workers?select=*&order=name.asc");
        renderDirectWorkers(workers || []);
      } catch (error) {
        setRequestMessage(`인력 목록 불러오기 실패: ${error.message}`);
      }
    };

    window.directLoadRequests = async function directLoadRequests() {
      const stored = getStoredSession();
      if (!stored?.profile?.id || stored.profile.role !== "admin") {
        return;
      }

      try {
        const [clients, requests] = await Promise.all([
          supabaseRest("clients?select=*&order=name.asc"),
          supabaseRest("job_requests?select=*&order=work_date.desc,created_at.desc")
        ]);
        renderDirectRequests(requests || [], clients || []);
      } catch (error) {
        setRequestMessage(`신청 내역 불러오기 실패: ${error.message}`);
      }
    };

    window.directRequestSubmit = async function directRequestSubmit(event) {
      if (event) {
        event.preventDefault();
        event.stopPropagation();
        event.stopImmediatePropagation();
      }

      setRequestMessage("버튼 클릭 확인. 요청을 저장하는 중입니다...", false);

      const stored = getStoredSession();
      if (!stored?.profile?.id || stored.profile.role !== "admin") {
        setRequestMessage("관리자 로그인 세션이 없습니다. 다시 로그인해 주세요.");
        return false;
      }

      const formData = new FormData(requestFormDirect);
      const clientName = String(formData.get("clientName") || "").trim();
      const contactMethod = String(formData.get("contactMethod") || "").trim();
      const headcount = Number(formData.get("headcount"));
      const siteLocation = String(formData.get("siteLocation") || "").trim();
      const workDate = String(formData.get("workDate") || "").trim();

      if (!clientName || !contactMethod || !headcount || !siteLocation || !workDate) {
        setRequestMessage("거래처명, 연락 방식, 요청 인원, 현장 위치, 근무일을 모두 입력해 주세요.");
        return false;
      }

      try {
        const clients = await supabaseRest("clients?on_conflict=name", {
          method: "POST",
          headers: {
            Prefer: "resolution=merge-duplicates,return=representation"
          },
          body: JSON.stringify({
            name: clientName,
            created_by: stored.profile.id
          })
        });
        const client = clients?.[0];
        if (!client?.id) {
          throw new Error("거래처 저장 결과를 확인하지 못했습니다.");
        }

        await supabaseRest("job_requests", {
          method: "POST",
          headers: {
            Prefer: "return=representation"
          },
          body: JSON.stringify({
            client_id: client.id,
            contact_method: contactMethod,
            headcount,
            site_location: siteLocation,
            work_date: workDate,
            status: "대기",
            created_by: stored.profile.id
          })
        });

        requestFormDirect.reset();
        await window.directLoadRequests();
        setRequestMessage("요청이 등록됐습니다. 아래 신청 내역에 바로 반영됐습니다.", false);
      } catch (error) {
        setRequestMessage(`요청 등록 실패: ${error.message}`);
      }

      return false;
    };

    window.directWorkerSubmit = async function directWorkerSubmit(event) {
      if (event) {
        event.preventDefault();
        event.stopPropagation();
        event.stopImmediatePropagation();
      }

      setRequestMessage("인력 추가 버튼 클릭 확인. 저장하는 중입니다...", false);

      const stored = getStoredSession();
      if (!stored?.profile?.id || stored.profile.role !== "admin") {
        setRequestMessage("관리자 로그인 세션이 없습니다. 다시 로그인해 주세요.");
        return false;
      }

      const formData = new FormData(workerFormDirect);
      const name = String(formData.get("name") || "").trim();
      const phone = String(formData.get("phone") || "").trim();

      if (!name || !phone) {
        setRequestMessage("인력 이름과 연락처를 모두 입력해 주세요.");
        return false;
      }

      try {
        await supabaseRest("workers", {
          method: "POST",
          headers: {
            Prefer: "return=representation"
          },
          body: JSON.stringify({ name, phone })
        });

        workerFormDirect.reset();
        await window.directLoadWorkers();
        setRequestMessage("인력이 추가됐습니다. 아래 인력 목록과 배정 선택에 바로 반영됐습니다.", false);
      } catch (error) {
        setRequestMessage(`인력 추가 실패: ${error.message}`);
      }

      return false;
    };

    window.directAssignmentSubmit = async function directAssignmentSubmit(event) {
      if (event) {
        event.preventDefault();
        event.stopPropagation();
        event.stopImmediatePropagation();
      }

      setRequestMessage("배정 저장 버튼 클릭 확인. 저장하는 중입니다...", false);

      const stored = getStoredSession();
      if (!stored?.profile?.id || stored.profile.role !== "admin") {
        setRequestMessage("관리자 로그인 세션이 없습니다. 다시 로그인해 주세요.");
        return false;
      }

      const requestId = String(new FormData(assignmentFormDirect).get("requestId") || "").trim();
      const workerSelect = document.getElementById("assignmentWorkerSelect");
      const workerIds = Array.from(workerSelect?.selectedOptions || [])
        .map((option) => option.value)
        .filter(Boolean);

      if (!requestId || workerIds.length === 0) {
        setRequestMessage("배정할 요청과 인력을 선택해 주세요.");
        return false;
      }

      try {
        const [currentRequests, currentWorkers] = await Promise.all([
          supabaseRest("job_requests?select=id"),
          supabaseRest("workers?select=id,name,phone&order=name.asc")
        ]);
        const validRequestIds = new Set((currentRequests || []).map((request) => request.id));
        const validWorkerIds = new Set((currentWorkers || []).map((worker) => worker.id));
        const invalidWorkerIds = workerIds.filter((workerId) => !validWorkerIds.has(workerId));

        if (!validRequestIds.has(requestId)) {
          await window.directLoadRequests();
          setRequestMessage("선택한 요청이 DB에 없습니다. 요청 목록을 새로 불러왔으니 다시 선택해 주세요.");
          return false;
        }

        if (invalidWorkerIds.length > 0) {
          renderDirectWorkers(currentWorkers || []);
          setRequestMessage("선택한 인력 중 DB에 없는 인력이 있습니다. 인력 목록을 새로 불러왔으니 다시 선택해 주세요.");
          return false;
        }

        const rows = workerIds.map((workerId) => ({
          request_id: requestId,
          worker_id: workerId,
          created_by: stored.profile.id
        }));

        await supabaseRest("assignments?on_conflict=request_id,worker_id", {
          method: "POST",
          headers: {
            Prefer: "resolution=merge-duplicates,return=representation"
          },
          body: JSON.stringify(rows)
        });

        const currentAssignments = await supabaseRest(`assignments?select=*&request_id=eq.${requestId}`);
        await supabaseRest(`job_requests?id=eq.${requestId}`, {
          method: "PATCH",
          headers: {
            Prefer: "return=minimal"
          },
          body: JSON.stringify({
            status: `${currentAssignments.length}명 배정`
          })
        });

        assignmentFormDirect.reset();
        await Promise.all([
          window.directLoadRequests(),
          window.directLoadAssignments()
        ]);
        setRequestMessage("배정이 저장됐습니다. 하단 배정 내역에 바로 반영됐습니다.", false);
      } catch (error) {
        setRequestMessage(`배정 저장 실패: ${error.message}`);
      }

      return false;
    };

    window.addEventListener("load", () => {
      window.directLoadRequests();
      window.directLoadWorkers();
      window.directLoadAssignments();
    });
  </script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="app.js?v=20260423-1"></script>
</body>
</html>
