<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>근무시간 입력</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=SUIT:wght@400;500;600;700;800&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="styles.css" />
</head>
<body data-page="worker-entry" data-role="user">
  <div class="app-shell">
    <div class="session-bar" id="sessionBar"></div>
    <header class="hero">
      <div>
        <p class="eyebrow">WORKER ENTRY</p>
        <h1>인력이 직접 근무시간을 입력합니다</h1>
        <p class="hero-copy">시작시간, 종료시간, 휴게시간을 입력하면 실근무와 공수가 자동 계산됩니다.</p>
      </div>
      <nav class="top-nav">
        <a href="login.html">로그인</a>
        <button type="button" class="ghost-btn" data-action="logout">로그아웃</button>
      </nav>
    </header>

    <main class="dashboard">
      <section class="panel panel-highlight">
        <div class="panel-header">
          <div>
            <p class="section-kicker">WORK TIME</p>
            <h2>근무시간 입력</h2>
          </div>
        </div>
        <div class="worker-entry-layout">
          <form id="manualEntryForm" class="stack-form">
            <label>
              내 배정 선택
              <select name="assignmentId" id="manualAssignmentSelect" required></select>
            </label>
            <label>
              근무 시작시간
              <input type="datetime-local" name="startTime" id="manualStartTime" required />
            </label>
            <label>
              근무 종료시간
              <input type="datetime-local" name="endTime" id="manualEndTime" required />
            </label>
            <label>
              휴게시간(분)
              <input type="number" name="breakMinutes" id="manualBreakMinutes" min="0" value="0" required />
            </label>
            <div class="calc-preview" id="manualPreview"></div>
            <button type="submit" class="primary-btn">근무시간 저장</button>
          </form>

          <div class="subpanel">
            <h3>입력 결과</h3>
            <div class="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th>인력명</th>
                    <th>거래처</th>
                    <th>근무일</th>
                    <th>실근무</th>
                    <th>공수</th>
                  </tr>
                </thead>
                <tbody id="manualEntryTable"></tbody>
              </table>
            </div>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <script src="app.js"></script>
</body>
</html>
