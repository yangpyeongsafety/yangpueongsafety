<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>근무시간 입력</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=SUIT:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body data-page="worker-entry" data-role="worker">
  <div class="app-shell">
    <div class="session-bar" id="sessionBar"></div>
    <header class="hero">
      <div>
        <p class="eyebrow">근무시간 입력</p>
        <h1>내 배치 내역과 근무시간을 입력하세요</h1>
        <p class="hero-copy">배정된 항목을 선택한 뒤 시작시간, 종료시간, 휴게시간을 입력하면 실근무시간과 공수가 자동 계산됩니다.</p>
      </div>
      <nav class="top-nav">
        <a href="main.html">메인으로</a>
        <a class="ghost-btn" href="logout.html">로그아웃</a>
      </nav>
    </header>
    <main class="dashboard">
      <section class="panel">
        <div class="panel-header">
          <div>
            <p class="section-kicker">내 배치</p>
            <h2>배정된 항목</h2>
          </div>
        </div>
        <p id="authMessage" class="auth-message"></p>
        <div id="myAssignmentList" class="assignment-list"></div>
      </section>
      <section class="panel panel-highlight">
        <div class="panel-header">
          <div>
            <p class="section-kicker">근무 입력</p>
            <h2>근무시간 등록</h2>
          </div>
        </div>
        <div class="worker-entry-layout">
          <form id="manualEntryForm" class="stack-form" autocomplete="off">
            <label>내 배정 선택<select name="assignmentId" id="manualAssignmentSelect" required></select></label>
            <label>근무 시작시간<input type="datetime-local" name="startTime" id="manualStartTime" required /></label>
            <label>근무 종료시간<input type="datetime-local" name="endTime" id="manualEndTime" required /></label>
            <label>휴게시간(분)<input type="number" name="breakMinutes" id="manualBreakMinutes" min="0" value="0" required /></label>
            <div class="calc-preview" id="manualPreview"></div>
            <button type="submit" class="primary-btn">근무시간 저장</button>
          </form>
          <div class="subpanel">
            <h3>입력 결과</h3>
            <div class="table-wrap">
              <table>
                <thead><tr><th>배정 항목</th><th>작업일</th><th>상태</th><th>실근무</th><th>공수</th></tr></thead>
                <tbody id="manualEntryTable"></tbody>
              </table>
            </div>
          </div>
        </div>
      </section>
    </main>
  </div>
  <script src="supabase-config.js"></script>
  <script>
    const sessionBar = document.getElementById('sessionBar');
    const authMessage = document.getElementById('authMessage');
    const myAssignmentList = document.getElementById('myAssignmentList');
    const manualEntryForm = document.getElementById('manualEntryForm');
    const manualAssignmentSelect = document.getElementById('manualAssignmentSelect');
    const manualStartTime = document.getElementById('manualStartTime');
    const manualEndTime = document.getElementById('manualEndTime');
    const manualBreakMinutes = document.getElementById('manualBreakMinutes');
    const manualPreview = document.getElementById('manualPreview');
    const manualEntryTable = document.getElementById('manualEntryTable');
    const state = { profile: null, assignments: [], workLogs: [], requests: [], requestLoadError: '' };

    function setMessage(message, isError = true) {
      authMessage.textContent = message;
      authMessage.className = isError ? 'auth-message error' : 'auth-message success';
    }
    function escapeHtml(value) {
      return String(value ?? '').replaceAll('&', '&amp;').replaceAll('<', '&lt;').replaceAll('>', '&gt;').replaceAll('"', '&quot;').replaceAll("'", '&#039;');
    }
    function normalizePhone(value) { return String(value || '').replace(/\D+/g, ''); }
    function formatDate(value) { return value ? new Date(`${value}T00:00:00`).toLocaleDateString('ko-KR') : '작업일 확인 필요'; }
    function formatDateTime(value) {
      if (!value) return '';
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return '';
      const offset = date.getTimezoneOffset();
      return new Date(date.getTime() - offset * 60000).toISOString().slice(0, 16);
    }
    function formatHours(value) { return `${Number(value || 0).toFixed(1)}시간`; }
    function formatGongsu(value) { return `${Number(value || 0).toFixed(1)}공수`; }
    function statusClass(status) {
      if (status === '근무입력 완료' || status === '입력 완료') return 'complete';
      if (status === '배치완료') return 'progress';
      return 'waiting';
    }
    function calculateWorkMetrics(startTime, endTime, breakMinutes) {
      if (!startTime || !endTime) return null;
      const start = new Date(startTime);
      const end = new Date(endTime);
      if (Number.isNaN(start.getTime()) || Number.isNaN(end.getTime()) || end <= start) return null;
      const totalMinutes = (end.getTime() - start.getTime()) / 60000;
      const netMinutes = Math.max(0, totalMinutes - Math.max(0, breakMinutes));
      const workHours = Math.round((netMinutes / 60) * 10) / 10;
      let gongsu = 0;
      if (workHours > 0 && workHours <= 8) gongsu = Math.round((workHours / 8) * 10) / 10;
      else if (workHours > 8) gongsu = Math.round((1 + (workHours - 8) * 0.1) * 10) / 10;
      return { workHours, gongsu };
    }
    function getStoredSession() {
      try {
        const raw = localStorage.getItem('workforce.session');
        return raw ? JSON.parse(raw) : null;
      } catch {
        return null;
      }
    }
    function saveStoredSession(stored, auth) {
      const authPayload = { access_token: auth.access_token, refresh_token: auth.refresh_token || stored.auth.refresh_token, expires_in: auth.expires_in, expires_at: Math.floor(Date.now() / 1000) + Number(auth.expires_in || 0), token_type: auth.token_type, user: auth.user || stored.auth.user };
      const nextStored = { ...stored, auth: authPayload };
      localStorage.setItem('workforce.session', JSON.stringify(nextStored));
      localStorage.setItem('sb-riyxhsesprzvnvconhos-auth-token', JSON.stringify({ currentSession: authPayload, expiresAt: authPayload.expires_at }));
      return nextStored;
    }
    function updateStoredProfile(profile) {
      const stored = getStoredSession();
      if (!stored) return;
      localStorage.setItem('workforce.session', JSON.stringify({ ...stored, profile }));
    }
    async function refreshStoredSession(stored) {
      const refreshToken = stored?.auth?.refresh_token;
      if (!refreshToken) throw new Error('로그인 시간이 만료됐습니다. 다시 로그인해 주세요.');
      const response = await fetch(`${window.SUPABASE_URL}/auth/v1/token?grant_type=refresh_token`, { method: 'POST', headers: { 'Content-Type': 'application/json', apikey: window.SUPABASE_ANON_KEY }, body: JSON.stringify({ refresh_token: refreshToken }) });
      const data = await response.json();
      if (!response.ok) {
        localStorage.removeItem('workforce.session');
        throw new Error(data?.message || '로그인 시간이 만료됐습니다. 다시 로그인해 주세요.');
      }
      return saveStoredSession(stored, data);
    }
    async function getValidStoredSession() {
      const stored = getStoredSession();
      if (!stored?.auth?.access_token || !stored?.profile) throw new Error('작업자 로그인 정보가 없습니다. 다시 로그인해 주세요.');
      const expiresAt = Number(stored.auth.expires_at || 0);
      if (expiresAt && expiresAt < Math.floor(Date.now() / 1000) + 60) return refreshStoredSession(stored);
      return stored;
    }
    async function supabaseRest(path, options = {}, retry = true) {
      const stored = await getValidStoredSession();
      const response = await fetch(`${window.SUPABASE_URL}/rest/v1/${path}`, { ...options, headers: { 'Content-Type': 'application/json', apikey: window.SUPABASE_ANON_KEY, Authorization: `Bearer ${stored.auth.access_token}`, ...(options.headers || {}) } });
      const text = await response.text();
      const data = text ? JSON.parse(text) : null;
      if (!response.ok) {
        const message = data?.message || data?.msg || response.statusText;
        if (retry && /jwt expired/i.test(message)) {
          await refreshStoredSession(stored);
          return supabaseRest(path, options, false);
        }
        throw new Error(message);
      }
      return data;
    }
    function isWorkerRole(role) { return role === 'worker' || role === 'user'; }
    function isSessionError(error) {
      const message = String(error?.message || '');
      return message.includes('로그인') || message.includes('jwt') || message.includes('401') || message.includes('403');
    }
    function redirectToLogin(message) {
      const params = new URLSearchParams({ redirect: 'worker-entry.html', role: 'worker', message });
      window.location.href = `index.html?${params.toString()}`;
    }
    function renderSession() {
      if (!state.profile) {
        sessionBar.innerHTML = '<span>로그인 정보가 없습니다.</span><a class="session-link" href="index.html">로그인</a>';
        return;
      }
      sessionBar.innerHTML = `<span><strong>${escapeHtml(state.profile.name)}</strong> · 작업자 · ${escapeHtml(state.profile.login_id || '')}</span><span class="session-actions"><a class="session-link" href="main.html">메인</a></span>`;
    }
    function getLog(assignmentId) { return state.workLogs.find((log) => log.assignment_id === assignmentId); }
    function getRequest(requestId) {
      return state.requests.find((request) => request.id === requestId) || null;
    }
    function formatAssignmentTitle(assignment) {
      const request = getRequest(assignment.request_id);
      return request?.site_location || `배정 ${String(assignment.id || '').slice(0, 8)}`;
    }
    function formatAssignmentDate(assignment) {
      const request = getRequest(assignment.request_id);
      return request?.work_date ? formatDate(request.work_date) : '작업일 확인 필요';
    }
    function formatAssignmentMeta(assignment) {
      const request = getRequest(assignment.request_id);
      const assignedDate = new Date(assignment.created_at).toLocaleDateString('ko-KR');
      if (!request) return `작업일 확인 필요 · 배정일 ${assignedDate}`;
      const headcountLabel = Number(request.headcount || 0) > 0 ? `${Number(request.headcount)}명 요청` : '인원 확인 필요';
      return `${formatAssignmentDate(assignment)} · ${headcountLabel} · 배정일 ${assignedDate}`;
    }
    function renderAssignmentCards() {
      if (state.assignments.length === 0) {
        myAssignmentList.innerHTML = '<p class="empty">현재 배정된 항목이 없습니다.</p>';
        return;
      }
      myAssignmentList.innerHTML = state.assignments.map((assignment) => {
        const log = getLog(assignment.id);
        const workStatus = log && (Number(log.work_hours || 0) > 0 || Number(log.labor_units || 0) > 0) ? '근무입력 완료' : '입력 전';
        return `<article class="assignment-card"><div class="assignment-card-header"><div><h3>${escapeHtml(formatAssignmentTitle(assignment))}</h3><p class="assignment-meta">${escapeHtml(formatAssignmentMeta(assignment))}</p></div><div class="status-stack"><span class="status-pill progress">배치완료</span><span class="status-pill ${statusClass(workStatus)}">${escapeHtml(workStatus)}</span></div></div></article>`;
      }).join('');
    }
    function renderAssignmentOptions() {
      if (state.assignments.length === 0) {
        manualAssignmentSelect.innerHTML = '<option value="">입력 가능한 배정이 없습니다.</option>';
        return;
      }
      const currentValue = manualAssignmentSelect.value;
      manualAssignmentSelect.innerHTML = state.assignments.map((assignment) => `<option value="${assignment.id}">${formatAssignmentDate(assignment)} / ${escapeHtml(formatAssignmentTitle(assignment))} / 배치완료</option>`).join('');
      const nextValue = state.assignments.some((assignment) => assignment.id === currentValue) ? currentValue : state.assignments[0].id;
      manualAssignmentSelect.value = nextValue;
      applyManualSelection();
    }
    function renderManualEntryTable() {
      if (state.assignments.length === 0) {
        manualEntryTable.innerHTML = '<tr><td colspan="5" class="empty">아직 입력할 배정이 없습니다.</td></tr>';
        return;
      }
      manualEntryTable.innerHTML = state.assignments.map((assignment) => {
        const log = getLog(assignment.id);
        const status = log && (Number(log.work_hours || 0) > 0 || Number(log.labor_units || 0) > 0) ? '입력 완료' : '입력 전';
        return `<tr><td>${escapeHtml(formatAssignmentTitle(assignment))}</td><td>${formatAssignmentDate(assignment)}</td><td><span class="status-pill ${statusClass(status)}">${escapeHtml(status)}</span></td><td>${formatHours(log?.work_hours || 0)}</td><td>${formatGongsu(log?.labor_units || 0)}</td></tr>`;
      }).join('');
    }
    function updateManualPreview(forceError = false) {
      const result = calculateWorkMetrics(manualStartTime.value, manualEndTime.value, Number(manualBreakMinutes.value || 0));
      if (forceError || !result) {
        manualPreview.innerHTML = '<strong>공수 계산 미리보기</strong><span>시작시간과 종료시간을 올바르게 입력하면 자동 계산됩니다.</span>';
        return;
      }
      manualPreview.innerHTML = `<strong>실근무 ${formatHours(result.workHours)} / 공수 ${formatGongsu(result.gongsu)}</strong><span>8시간 기준 1.0, 이후 1시간마다 0.1씩 추가됩니다.</span>`;
    }
    function applyManualSelection() {
      const assignmentId = manualAssignmentSelect.value;
      const log = getLog(assignmentId);
      manualStartTime.value = formatDateTime(log?.start_time || '');
      manualEndTime.value = formatDateTime(log?.end_time || '');
      manualBreakMinutes.value = Number(log?.break_minutes || 0);
      updateManualPreview();
    }
    async function trySelfPatchProfile() {
      if (!state.profile?.id) return;
      const stored = getStoredSession();
      const authUserMeta = stored?.auth?.user?.user_metadata || {};
      const profilePatch = {};
      if ((!state.profile.name || /^\?+$/.test(String(state.profile.name))) && authUserMeta.name) profilePatch.name = String(authUserMeta.name).trim();
      const currentPhone = normalizePhone(state.profile.phone);
      const authPhone = normalizePhone(authUserMeta.phone);
      if (authPhone && currentPhone !== authPhone) profilePatch.phone = authPhone;
      else if (state.profile.phone && currentPhone !== String(state.profile.phone).trim()) profilePatch.phone = currentPhone;
      if (Object.keys(profilePatch).length === 0) return;
      try {
        await supabaseRest(`profiles?id=eq.${state.profile.id}`, { method: 'PATCH', headers: { Prefer: 'return=representation' }, body: JSON.stringify(profilePatch) });
        const refreshed = await supabaseRest(`profiles?select=id,role,name,phone,worker_id,login_id&id=eq.${state.profile.id}`);
        const nextProfile = refreshed?.[0];
        if (nextProfile?.id) {
          state.profile = nextProfile;
          updateStoredProfile(nextProfile);
        }
      } catch {}
    }
    async function loadWorkerAssignments() {
      if (!state.profile?.worker_id) return [];
      return supabaseRest(`assignments?select=id,worker_id,request_id,created_at&worker_id=eq.${state.profile.worker_id}&order=created_at.desc`);
    }
    async function loadWorkerLogs() {
      if (!state.profile?.worker_id) return [];
      return supabaseRest(`work_logs?select=*&worker_id=eq.${state.profile.worker_id}&order=updated_at.desc`);
    }
    async function loadWorkerRequests(requestIds = []) {
      if (!requestIds || requestIds.length === 0) return [];
      const encodedIds = requestIds.map((requestId) => encodeURIComponent(requestId)).join(',');
      return supabaseRest(`job_requests?select=id,client_id,site_location,work_date,headcount,status&id=in.(${encodedIds})&order=work_date.desc`);
    }
    async function loadWorkerPage() {
      state.requestLoadError = '';
      if (!state.profile?.worker_id) {
        state.assignments = [];
        state.workLogs = [];
        state.requests = [];
        renderAssignmentCards();
        renderAssignmentOptions();
        renderManualEntryTable();
        updateManualPreview();
        return;
      }
      const assignments = await loadWorkerAssignments();
      const requestIds = Array.from(new Set((assignments || []).map((assignment) => assignment.request_id).filter(Boolean)));
      const workLogsPromise = loadWorkerLogs();
      const requestsPromise = loadWorkerRequests(requestIds).catch((error) => {
        state.requestLoadError = error.message || 'request load failed';
        return [];
      });
      const [workLogs, requests] = await Promise.all([workLogsPromise, requestsPromise]);
      state.assignments = assignments || [];
      state.workLogs = workLogs || [];
      state.requests = requests || [];
      renderAssignmentCards();
      renderAssignmentOptions();
      renderManualEntryTable();
      updateManualPreview();
    }
    async function handleManualEntrySubmit(event) {
      event.preventDefault();
      const assignmentId = String(new FormData(manualEntryForm).get('assignmentId') || '');
      const startTime = manualStartTime.value;
      const endTime = manualEndTime.value;
      const breakMinutes = Number(manualBreakMinutes.value || 0);
      const assignment = state.assignments.find((item) => item.id === assignmentId);
      const result = calculateWorkMetrics(startTime, endTime, breakMinutes);
      if (!assignment || !result) {
        updateManualPreview(true);
        setMessage('시작시간과 종료시간을 올바르게 입력해 주세요.');
        return;
      }
      try {
        setMessage('근무시간을 저장하는 중입니다...', false);
        await supabaseRest('work_logs?on_conflict=assignment_id', { method: 'POST', headers: { Prefer: 'resolution=merge-duplicates,return=representation' }, body: JSON.stringify({ assignment_id: assignmentId, worker_id: assignment.worker_id, start_time: new Date(startTime).toISOString(), end_time: new Date(endTime).toISOString(), break_minutes: breakMinutes, work_hours: result.workHours, labor_units: result.gongsu }) });
        await loadWorkerPage();
        manualAssignmentSelect.value = assignmentId;
        applyManualSelection();
        setMessage('근무시간이 저장되었습니다.', false);
      } catch (error) {
        setMessage(`근무시간 저장 실패: ${error.message}`);
      }
    }
    async function bootstrap() {
      try {
        const stored = await getValidStoredSession();
        if (!isWorkerRole(stored.profile.role)) { redirectToLogin('작업자 계정으로 로그인해 주세요.'); return; }
        state.profile = stored.profile;
        await trySelfPatchProfile();
        renderSession();
        setMessage('내 배치 내역을 불러오는 중입니다...', false);
        await loadWorkerPage();
        if (state.assignments.length === 0) {
          setMessage('배정된 항목이 아직 없습니다.', true);
        } else if (state.requestLoadError) {
          setMessage('배정 내역은 불러왔습니다. 현장 정보는 일부만 표시됩니다.', false);
        } else {
          setMessage('작업자 페이지가 준비되었습니다.', false);
        }
      } catch (error) {
        if (isSessionError(error)) { redirectToLogin(error.message); return; }
        state.profile = getStoredSession()?.profile || null;
        renderSession();
        renderAssignmentCards();
        renderAssignmentOptions();
        renderManualEntryTable();
        updateManualPreview();
        setMessage(`작업자 페이지 로드 실패: ${error.message}`);
      }
    }
    manualEntryForm.addEventListener('submit', handleManualEntrySubmit);
    manualAssignmentSelect.addEventListener('change', applyManualSelection);
    manualStartTime.addEventListener('input', () => updateManualPreview());
    manualEndTime.addEventListener('input', () => updateManualPreview());
    manualBreakMinutes.addEventListener('input', () => updateManualPreview());
    bootstrap();
  </script>
</body>
</html>
